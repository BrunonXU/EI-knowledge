<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>具身智能知识库 | EI Knowledge</title>
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2332;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-green: #10b981;
  --accent-orange: #f59e0b;
  --accent-purple: #8b5cf6;
  --gradient-1: linear-gradient(135deg, #3b82f6, #06b6d4);
  --gradient-2: linear-gradient(135deg, #8b5cf6, #ec4899);
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.7;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 50% 20%, rgba(59,130,246,0.12) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.08) 0%, transparent 40%);
  pointer-events: none;
}
.container {
  position: relative;
  max-width: 800px;
  width: 100%;
}
.header {
  text-align: center;
  margin-bottom: 3rem;
}
.header h1 {
  font-size: 2.8rem;
  font-weight: 800;
  background: var(--gradient-1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}
.header .subtitle {
  font-size: 1.1rem;
  color: var(--text-secondary);
  max-width: 500px;
  margin: 0 auto;
}
.badge {
  display: inline-block;
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  color: var(--accent-cyan);
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.25rem 0.75rem;
  border-radius: 20px;
  margin-bottom: 1rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.card-list {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.card {
  display: block;
  background: var(--bg-card);
  border: 1px solid rgba(59,130,246,0.15);
  border-radius: var(--radius);
  padding: 1.5rem 2rem;
  text-decoration: none;
  color: inherit;
  transition: all 0.3s ease;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--gradient-1);
  opacity: 0;
  transition: opacity 0.3s;
}
.card:hover {
  border-color: rgba(59,130,246,0.4);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(59,130,246,0.15);
}
.card:hover::before { opacity: 1; }
.card-title {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 0.4rem;
  display: flex;
  align-items: center;
  gap: 0.6rem;
}
.card-title .icon {
  font-size: 1.4rem;
}
.card-desc {
  color: var(--text-secondary);
  font-size: 0.9rem;
}
.card-tags {
  margin-top: 0.75rem;
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
}
.tag {
  background: rgba(6,182,212,0.1);
  border: 1px solid rgba(6,182,212,0.25);
  color: var(--accent-cyan);
  font-size: 0.72rem;
  padding: 0.15rem 0.55rem;
  border-radius: 6px;
}
.footer {
  text-align: center;
  margin-top: 3rem;
  color: var(--text-secondary);
  font-size: 0.8rem;
}
.footer a {
  color: var(--accent-blue);
  text-decoration: none;
}
.footer a:hover { text-decoration: underline; }
@media (max-width: 600px) {
  .header h1 { font-size: 2rem; }
  .card { padding: 1.2rem 1.4rem; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="badge">Embodied Intelligence</div>
    <h1>具身智能知识库</h1>
    <p class="subtitle">系统化梳理具身智能核心技术，涵盖仿真数据生成、强化学习、Sim-to-Real 等方向</p>
  </div>

  <div class="card-list">
    <a class="card" href="mimicgen.html">
      <div class="card-title">
        <span class="icon">🤖</span>
        MimicGen - 仿真数据扩充技术详解
      </div>
      <div class="card-desc">
        深入解析 MimicGen 的核心思想：如何从少量人类演示出发，通过对象姿态变换自动生成大规模高质量机器人操作训练数据。包含完整 pipeline、数学原理与交互动画。
      </div>
      <div class="card-tags">
        <span class="tag">Data Augmentation</span>
        <span class="tag">Robosuite</span>
        <span class="tag">Manipulation</span>
        <span class="tag">Imitation Learning</span>
      </div>
    </a>

    <!-- 更多知识点将在此添加 -->
  </div>

  <div class="footer">
    <p>EI Knowledge &mdash; 持续更新中 | <a href="https://github.com/BrunonXU/EI-knowledge">GitHub</a></p>
  </div>
</div>

</body>
</html>
